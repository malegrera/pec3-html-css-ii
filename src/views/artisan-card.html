<article class="card group">

  <div class="card-img-wrapper">
    <img
      src="{{image}}"
      alt="{{name}}"
      class="card-img"
      loading="lazy"
    />
  </div>

  <div class="card-body">

    <h2 class="card-title">
      {{name}}
    </h2>

    <p class="card-subtitle">
      {{role}}
    </p>

    <p class="card-text">
      {{description}}
    </p>

    <a href="#" class="card-btn">
      Ver más
      <i class="fa-solid fa-arrow-right"></i>
    </a>

  </div>

</article>
